<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Weather Tracker</title>
	<link rel="stylesheet" href="./style.css">
	<script src="./logic.js" defer></script>
</head>
<h1>🌤️ Async Weather Tracker</h1>
	<div id="container">
		<div class="form">
			<h2>Search City</h2>
			<form>
				<input type="text" name="city" id="city" placeholder="Enter the City...">
				<input type="submit" value="Search	&#x1F50D;">
			</form>
			<h2>Search History</h2>
			<div id="history">
			</div>
		</div>
		<div class="result">
			<h2>Weather Info</h2>
			<div class="details">
			
			</div>
		</div>
	</div>
</html>
